version: 2

models:
  - name: dim_region
    description: Conformed region dimension for palm-oil estates.
    columns:
      - name: region_key
        tests: [not_null, unique]
      - name: island
        tests:
          - accepted_values:
              values: ['Sumatra', 'Kalimantan']

  - name: fct_estate_operations_daily
    description: >
      Daily fact per region: agronomy suitability signals joined to CPO price.
      Grain = one row per (region_key, operation_date).
    columns:
      - name: operations_key
        tests: [not_null, unique]
      - name: region_key
        tests:
          - not_null
          - relationships:
              to: ref('dim_region')
              field: region_key
      - name: operation_date
        tests: [not_null]
      - name: cpo_usd_per_tonne
        tests:
          - dbt_utils.accepted_range:
              min_value: 100
              max_value: 3000

exposures:
  - name: estate_operations_dashboard
    type: dashboard
    maturity: low
    owner:
      name: Ihsan Wanda
      email: ihsantriwanda@gmail.com
    description: BI dashboard recommending daily fertilize/harvest/spray actions by region.
    depends_on:
      - ref('fct_estate_operations_daily')
      - ref('dim_region')
